<html>
    <head>
        <meta charset="utf-8">
        <title>Practica 4</title>

        <style>
.producId{
    width: 350px;
    margin: 50px auto;
    border: 1px solid #ccc;
    border-radius: 10px;
    box-shadow: 0 4px 10px;
    padding: 20px;
    font-family: sans-serif;
    overflow:hidden;
}
.header{
    background: linear-gradient(to right, #4facfe, #00f2fe);
    margin: -20px -20px 20px -20px;
    padding: 15px;
    text-align: center;
    color: white;
}
img{
    float: left;
    width: 80px;
    margin-right: 15px;
    border-radius: 5px;
}
.precio{
    display:block;
    font-weight: bold;
    font-size: 1.5rem;
    margin: 15px 0;
    clear: both;
}

.btn{
    display: block;
    text-align: center;
    padding: 10px;
    text-decoration: none;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:link{ background: #28a745; color: white;}
.btn:visited{background: #1e7e34;}
.btn:hover{ background: #218838; opacity: 0.9;}
.btn:active{ background: #155724;}

        </style>
    </head>

    <body>
        <div class="producId">
            <div class="header">
                <h3>reloj inteligente</h3>
            </div>
            <img src="Reloj inteligente.webp" alt="Reloj">
            <p>Smartwatch Reloj Inteligente GS Ultra 2 4gb Rom Mp3</p>
            <span class="precio">$1149.00</span>
            <a href="#" class="btn">Comprar</a>
        </div>
    </body>
</html>
